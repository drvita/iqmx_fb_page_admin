services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      - APP_ENV=${APP_ENV}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRE_DAYS=${JWT_EXPIRE_DAYS}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_NAME=${DB_NAME}
      - FB_APP_ID=${FB_APP_ID}
      - FB_APP_SECRET=${FB_APP_SECRET}
      - NEXT_PUBLIC_FB_APP_ID=${NEXT_PUBLIC_FB_APP_ID}
      - NEXT_PUBLIC_FB_API_VERSION=${NEXT_PUBLIC_FB_API_VERSION}
    restart: always
    networks:
      - default
      - coolify

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_FB_APP_ID=${NEXT_PUBLIC_FB_APP_ID}
      - NEXT_PUBLIC_FB_API_VERSION=${NEXT_PUBLIC_FB_API_VERSION}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    restart: always
    networks:
      - default
      - coolify

networks:
  coolify:
    external: true
